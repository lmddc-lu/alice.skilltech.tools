services:
  qdrant:
      image: qdrant/qdrant:v1.17
      restart: unless-stopped
      container_name: qdrant-haystack
      ports:
        - 6363:6333
        - 6364:6334
      expose:
        - 6333
        - 6334
        - 6335
      configs:
        - source: qdrant_config
          target: /qdrant/config/production.yaml
      volumes:
        - qdrant_data:/qdrant/storage
      ulimits:
        nofile:
          soft: 65536
          hard: 65536


  valkey:
    image: valkey/valkey:8-alpine
    container_name: valkey
    restart: unless-stopped
    ports:
     - "6380:6379"
    volumes:
      - valkey_data:/data
    command: valkey-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru


  docling:
    image: ghcr.io/docling-project/docling-serve-cu130:v1.27.0
    container_name: docling
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - DOCLING_SERVE_ENABLE_UI=1
      # --- device & threading ---
      - DOCLING_DEVICE=cuda
      - DOCLING_NUM_THREADS=8            # CPU threads for PDF parse (~physical cores)
      # --- GPU batching: larger batches better utilize a single card ---
      - DOCLING_PERF_PAGE_BATCH_SIZE=8
      - DOCLING_SERVE_OCR_BATCH_SIZE=8
      - DOCLING_SERVE_LAYOUT_BATCH_SIZE=8
      - DOCLING_SERVE_TABLE_BATCH_SIZE=8
      # --- workers: share model weights across threads to save VRAM. ---
      # Keep UVICORN_WORKERS=1 (default): extra uvicorn workers each load a full
      # model set and will OOM a single GPU. Scale via NUM_WORKERS/batch sizes.
      - DOCLING_SERVE_ENG_LOC_NUM_WORKERS=2
      - DOCLING_SERVE_ENG_LOC_SHARE_MODELS=true
      - DOCLING_SERVE_LOAD_MODELS_AT_BOOT=true   # avoid first-request cold start
      # Hold both DocumentConverter variants (force_ocr on/off) warm in cache.
      - DOCLING_SERVE_OPTIONS_CACHE_SIZE=4
      # --- safety caps: bound runaway / oversized documents ---
      - DOCLING_SERVE_MAX_DOCUMENT_TIMEOUT=600
      - DOCLING_SERVE_MAX_NUM_PAGES=2000
      - DOCLING_SERVE_MAX_FILE_SIZE=209715200    # 200 MB
    volumes:
      # Persist the model artifacts cache. An empty named volume is seeded from
      # the image's pre-baked models on first start; the CodeFormula model
      # (needed for do_formula_enrichment) is added via docling-tools and then
      # survives image updates.
      - docling_models:/opt/app-root/src/.cache/docling/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s


  hayhooks-inference:
    build:
      context: ./rag-pipeline
      dockerfile: Dockerfile.gpu
    container_name: hayhooks-inference
    ports:
      - "1416:1416"
    depends_on:
      qdrant:
        condition: service_started
      valkey:
        condition: service_started
      docling:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://valkey:6379/0
      - SESSION_TTL=${SESSION_TTL:-3600}
      - ENABLE_SESSION_STORAGE=${ENABLE_SESSION_STORAGE:-true}
      - CONTEXTUALIZE_QUERY_ENABLED=${CONTEXTUALIZE_QUERY_ENABLED:-false}
      - HAYSTACK_PIPELINE_BREAKPOINT_ENABLED=false
      - DOCLING_SERVE_URL=${DOCLING_SERVE_URL:-http://docling:5001}
      - DOCLING_SERVE_API_KEY=${DOCLING_SERVE_API_KEY}
      - DOCLING_SERVE_TIMEOUT=${DOCLING_SERVE_TIMEOUT}
      - DOCLING_OCR_ENGINE=${DOCLING_OCR_ENGINE}
      - DOCLING_OCR_LANG=${DOCLING_OCR_LANG}
      - DOCLING_PDF_BACKEND=${DOCLING_PDF_BACKEND}
      - DOCLING_TABLE_MODE=${DOCLING_TABLE_MODE}
      - DOCLING_DOCUMENT_TIMEOUT=${DOCLING_DOCUMENT_TIMEOUT}
      - DOCLING_DO_FORMULA_ENRICHMENT=${DOCLING_DO_FORMULA_ENRICHMENT}
      - LLM_API_BASE=${LLM_API_BASE}
      - LLM_API_KEY=${LLM_API_KEY}
      - GENERATION_MODEL_ID=${GENERATION_MODEL_ID}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE}
      - LLM_TOP_P=${LLM_TOP_P}
      - LLM_TOP_K=${LLM_TOP_K}
      - LLM_ENABLE_THINKING=${LLM_ENABLE_THINKING}
      - EMBED_API_BASE=${EMBED_API_BASE}
      - EMBED_API_KEY=${EMBED_API_KEY}
      - EMBED_MODEL=${EMBED_MODEL}
      - HAYHOOKS_CHAINLIT_ENABLED=true
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:1416/status | grep -q rag_query"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  hayhooks-ingestion:
    build:
      context: ./rag-pipeline
      dockerfile: Dockerfile.gpu
    container_name: hayhooks-ingestion
    command: ["hayhooks", "run", "--host", "0.0.0.0", "--workers", "2"]
    ports:
      - "1417:1416"
    environment:
      - REDIS_URL=redis://valkey:6379/0
      - SESSION_TTL=${SESSION_TTL:-3600}
      - ENABLE_SESSION_STORAGE=${ENABLE_SESSION_STORAGE:-true}
      - CONTEXTUALIZE_QUERY_ENABLED=${CONTEXTUALIZE_QUERY_ENABLED:-false}
      - HAYSTACK_PIPELINE_BREAKPOINT_ENABLED=false
      - DOCLING_SERVE_URL=${DOCLING_SERVE_URL:-http://docling:5001}
      - DOCLING_SERVE_API_KEY=${DOCLING_SERVE_API_KEY}
      - DOCLING_SERVE_TIMEOUT=${DOCLING_SERVE_TIMEOUT}
      - DOCLING_OCR_ENGINE=${DOCLING_OCR_ENGINE}
      - DOCLING_OCR_LANG=${DOCLING_OCR_LANG}
      - DOCLING_PDF_BACKEND=${DOCLING_PDF_BACKEND}
      - DOCLING_TABLE_MODE=${DOCLING_TABLE_MODE}
      - DOCLING_DOCUMENT_TIMEOUT=${DOCLING_DOCUMENT_TIMEOUT}
      - DOCLING_DO_FORMULA_ENRICHMENT=${DOCLING_DO_FORMULA_ENRICHMENT}
      - LLM_API_BASE=${LLM_API_BASE}
      - LLM_API_KEY=${LLM_API_KEY}
      - GENERATION_MODEL_ID=${GENERATION_MODEL_ID}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE}
      - LLM_TOP_P=${LLM_TOP_P}
      - LLM_TOP_K=${LLM_TOP_K}
      - LLM_ENABLE_THINKING=${LLM_ENABLE_THINKING}
      - EMBED_API_BASE=${EMBED_API_BASE}
      - EMBED_API_KEY=${EMBED_API_KEY}
      - EMBED_MODEL=${EMBED_MODEL}
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    depends_on:
      qdrant:
        condition: service_started
      valkey:
        condition: service_started
      docling:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:1416/status | grep -q document_ingestion"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped


  pii-filter:
    build:
      context: ./pii-filter
      dockerfile: Dockerfile.gpu
    container_name: pii-filter
    ports:
      - "1418:8000"
    environment:
      - PII_MODEL_NAME=${PII_MODEL_NAME}
      - PII_DEVICE=${PII_DEVICE:-0}
      - PII_STRIDE=${PII_STRIDE:-64}
      - HF_HOME=/models
    volumes:
      - pii_model_cache:/models
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    healthcheck:
      # /readyz returns 503 until the model finishes loading;
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/readyz"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 300s
    restart: unless-stopped

volumes:
  qdrant_data:
  valkey_data:
  pii_model_cache:
  docling_models:

configs:
  qdrant_config:
    content: |
      log_level: INFO
